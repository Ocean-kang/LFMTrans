seed: 2025

device_gpu: 0
save: 1

dataset:
  resize: 518
  root_dir_mscoco: data/mscoco
  root_dir_ade20k: data/ade20k/
  root_dir_pc: data/pascal_context
  root_dir_voc: data/pascal_voc
  DINOv2_BACKBONE_SIZE: large # small, base, large, giant
  val_batch_size: 8
  num_workers: 2

eval:
  DINOv2_BACKBONE_SIZE: large
  input_dim: 4096
  output_dim: 1024
  enabled: 0
  method: LFMTrans # LFMTtrans, uvlt, talk2dino
  checkpoint_path: './checkpoints/text_to_vision_projector.pt'


train:
  dataset: cocostuff
  batchsize: 1
  sample: 20
  text_model: llama_unmean # llama_unmean, mpnet_unmean
  type: patch_unmean # patch, patch_unmean

knngraph:
  k: 30
  metric_knn: ip # 'ip', 'L2'
  metric_laplacian: sym # 'none', 'sym', 'rw'

laplacian_mat:
  k: 170 # number of eigenvectors used in decomposition

anchor:
  n_anchors: 50
  cls_anchors: 2
  metric: ip # 'L2' or 'ip'

validation:
  dataset: cocostuff
  datasets: ['cocostuff', '150', 'voc20', 'pc59', 'CIFAR-100', 'ImageNet-100']
  text_model: llama # llama, mpnet
  type: patch
  shuffle_before_eval: false
  shuffle_trials: 1
  shuffle_seed: 2025

fmap:
  type: train # anchor, Ip_and_L2, train
  method: LFMtrans # LFMtrans, EOT
  lmbda: 200.0
  aux_lmbda: 10.0
  reg: 1.0e-6
  resolvant_gamma: 0.5

projector:
  hidden_dim: 4096
  dropout: 0.0
  normalize_output: true
  checkpoint_path: ''

projector_train:
  epochs: 20
  steps_per_epoch: 50
  classes_per_step: 16
  samples_per_class: 8
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 2.0
  log_every: 10
  ckpt_dir: ./checkpoints
  report_train_each_epoch: true

loss:
  w_bij: 1.0
  w_orth: 1.0
  w_lap: 1.0e-3
  w_ot: 0.75
  w_proper: 1.0
  temperature: 0.1
  ot_projections: 64
  ot_p: 2
