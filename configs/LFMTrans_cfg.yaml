seed: 2025

device_gpu: 0
save: 1

train:
  dataset: cocostuff
  batchsize: 1
  sample: 20
  text_model: llama_unmean # llama_unmean, mpnet_unmean
  type: patch_unmean # patch, patch_unmean

knngraph:
  k: 50
  metric_knn: ip # 'ip', 'L2'
  metric_laplacian: sym # 'none', 'sym', 'rw'

laplacian_mat:
  k: 128 # number of eigenvectors used in decomposition

anchor:
  n_anchors: 50
  cls_anchors: 2
  metric: ip # 'L2' or 'ip'

validation:
  dataset: cocostuff
  text_model: llama # llama, mpnet
  type: patch

fmap:
  type: train # anchor, Ip_and_L2, train
  method: LFMtrans # LFMtrans, EOT
  lmbda: 100.0
  aux_lmbda: 25.0
  reg: 1.0e-6
  resolvant_gamma: 0.5

projector:
  hidden_dim: 2048
  dropout: 0.0
  normalize_output: true
  checkpoint_path: ''

projector_train:
  epochs: 20
  steps_per_epoch: 50
  classes_per_step: 32
  samples_per_class: 4
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  log_every: 10
  ckpt_dir: ./checkpoints

loss:
  w_bij: 1.0
  w_orth: 1.0
  w_lap: 1.0e-3
  w_ot: 1.0
  w_proper: 1.0
  temperature: 0.07
  ot_projections: 64
  ot_p: 2
